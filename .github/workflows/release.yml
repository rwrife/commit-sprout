name: Release

# Cut a release when a version tag is pushed, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# GoReleaser (config in .goreleaser.yaml) cross-compiles static binaries for
# linux/macos/windows (amd64 + arm64) and publishes a GitHub Release with
# archives and checksums. The version is injected into `commit-sprout --version`
# from the tag.
on:
  push:
    tags:
      - "v*"

permissions:
  # Needed for GoReleaser to create the GitHub Release and upload assets.
  contents: write

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + tags so the changelog and version resolve correctly.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          check-latest: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          # Pin a concrete v2 line so releases are reproducible and match the
          # config syntax validated in CI/dev.
          version: "v2.4.4"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
